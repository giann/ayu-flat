orange_bg = "#47433D"
green_text = "#D5FF80"
green_text_sec = "#E4FFAA"
green_bg = "#2E3B2D"
teal_text = "#73D0FF"
teal_text_sec = "#97DDFF"
teal_bg = "#273646"
blue_text = "#73D0FF"
blue_text_sec = "#9ADFFF"
blue_bg = "#263240"
purple_text = "#DFBFFF"
purple_text_sec = "#EAD6FF"
purple_bg = "#3A3346"
diff_add = "#D5FF80"
diff_change = "#FFCC77"
diff_change_dark = "#6B5630"
diff_delete = "#F28779"
diff_renamed = "#73D0FF"
white = "#FFFFFF"
