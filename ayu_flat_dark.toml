green_text_sec = "#C2E675"
green_bg = "#23301F"
teal_text = "#73B8FF"
teal_text_sec = "#8AC7FF"
teal_bg = "#1F2D3A"
blue_text = "#59C2FF"
blue_text_sec = "#86D2FF"
blue_bg = "#1C2B38"
purple_text = "#D2A6FF"
purple_text_sec = "#E1C4FF"
