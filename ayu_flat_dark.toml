# Author: Benoit Giannangeli
# Background-first dark variant of Ayu Dark inspired by flatwhite's highlight strategy

"attribute" = { fg = "blue_text", bg = "blue_bg" }
"comment" = { fg = "comment_fg", bg = "comment_bg" }
"comment.line" = { fg = "comment_fg", bg = "comment_bg" }
"comment.block" = { fg = "comment_fg", bg = "comment_bg" }
"comment.block.documentation" = { fg = "comment_fg", bg = "comment_bg" }
"constant" = { fg = "blue_text", bg = "blue_bg" }
"constructor" = { fg = "base1" }
"function" = { fg = "orange_text" }
"keyword" = { fg = "purple_text", bg = "purple_bg" }
"label" = { fg = "base3" }
"namespace" = { fg = "teal_text", bg = "teal_bg" }
"operator" = { fg = "base1" }
"punctuation.bracket" = { fg = "base3" }
"special" = { fg = "blue_text", bg = "blue_bg" }
"string" = { fg = "green_text", bg = "green_bg" }
"type" = { fg = "blue_text", bg = "blue_bg" }
"variable" = { fg = "base1" }
"variable.parameter" = { fg = "blue_text", bg = "blue_bg" }

"diagnostic" = { modifiers = ["underlined"] }

"diagnostic.info" = { underline = { color = "orange_text", style = "curl" } }
"diagnostic.warning" = { underline = { color = "orange_text", style = "curl" } }
"diagnostic.error" = { underline = { color = "diff_delete", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

"info" = { fg = "orange_text", bg = "orange_bg" }
"hint" = { fg = "base3" }
"warning" = { fg = "orange_text", bg = "orange_bg" }
"error" = { fg = "diff_delete" }

"markup.heading" = { fg = "purple_text", bg = "purple_bg", modifiers = [
  "bold",
] }
"markup.raw" = { fg = "orange_text", bg = "orange_bg" }
"markup.raw.inline" = { fg = "orange_text", bg = "orange_bg" }
"markup.raw.block" = { fg = "orange_text", bg = "orange_bg" }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link.url" = { fg = "blue_text", bg = "blue_bg", modifiers = [
  "underlined",
] }
"markup.link.label" = { fg = "blue_text", bg = "blue_bg" }
"markup.link.text" = { fg = "blue_text", bg = "blue_bg" }
"markup.quote" = { fg = "teal_text", bg = "teal_bg" }
"markup.list" = { fg = "purple_text", bg = "purple_bg" }

"ui.background"= { bg = "background" }
"ui.cursor" = { fg = "dark_gray", bg = "yellow" }
"ui.cursor.primary" = { fg = "dark_gray", bg = "orange" }
"ui.cursor.match" = "orange"
"ui.linenr" = "dark_gray"
"ui.linenr.selected" = "gray"
"ui.statusline" = { fg = "foreground", bg = "black" }
"ui.statusline.normal" = { fg = "black", bg = "blue" }
"ui.statusline.insert" = { fg = "black", bg = "orange" }
"ui.statusline.select" = { fg = "black", bg = "magenta" }
"ui.cursorline" = { bg = "black" }
"ui.popup" = { fg = "#7B91b3", bg = "black" }
"ui.window" = "dark_gray"
"ui.help" = { fg = "#7B91b3", bg = "black" }
"ui.text" = "foreground"
"ui.text.focus" = { bg = "dark_gray", fg = "foreground" }
"ui.text.info" = "foreground"
"ui.virtual.whitespace" = "dark_gray"
"ui.virtual.ruler" = { bg = "black" }
"ui.virtual.inlay-hint" = { fg = "inlay_fg", bg = "inlay_bg" }
"ui.virtual.inlay-hint.parameter" = { fg = "inlay_fg", bg = "inlay_bg" }
"ui.virtual.inlay-hint.type" = { fg = "inlay_fg", bg = "inlay_bg", modifiers = ["italic"] }
"ui.menu" = { fg = "foreground", bg = "black" }
"ui.menu.selected" = { bg = "gray", fg = "background" }
"ui.selection" = { bg = "dark_gray" }
"ui.bufferline" = { fg = "gray", bg = "background" }
"ui.bufferline.active" = { fg = "foreground", bg = "dark_gray" }
"ui.debug" = { fg = "orange", bg = "background" }
"ui.highlight.frameline" = { bg = "#0067a3" }
"ui.virtual.jump-label" = { fg = "red", modifiers = ["italic", "bold"] }

"diff.plus" = { fg = "diff_add" }
"diff.delta" = { fg = "diff_change" }
"diff.minus" = { fg = "diff_delete" }

